version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: daily
      time: '00:00'
      timezone: Asia/Phnom_Penh
    open-pull-requests-limit: 10
    assignees:
      - visalnann
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: '00:00'
      timezone: Asia/Phnom_Penh
    open-pull-requests-limit: 10
    assignees:
      - visalnann
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '00:00'
      timezone: Asia/Phnom_Penh
    open-pull-requests-limit: 10
    assignees:
      - visalnann
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
